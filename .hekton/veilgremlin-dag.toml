acceptance = "masked round trip to Bedrock path; demask gate denies remote_model_prompt; CLI help complete. ADDED 2026-07-16: a human runs a real interactive Claude Code session with the hooks wired in against realistic prompts/tool output containing masking-worthy content, and explicitly confirms no perceptible added latency or workflow friction -- record the session and the human's honest verdict in docs/decisions.md, not just a benchmark number. If it IS perceptible, that's a real finding to fix or escalate, not a criterion to quietly relax."
