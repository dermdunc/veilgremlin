# VeilGremlin build DAG — the machine source of truth for the task-DAG
# orchestrator (agentic-control-tower's `dag` commands). Transcribed once from
# docs/architecture/work-breakdown.md's table + compact DAG diagram; edit
# THIS file if the plan changes, not the markdown (which stays the
# human-readable narrative — re-run `dag gen-specs` after any edit here to
# regenerate the corresponding engine-gateway-lab task specs).
#
# Wave-B tasks depend on BOTH T01 and T02, not just T02 (the work-breakdown
# table's "Blocks on" column lists only the contract dependency, T02) --
# agent-factory-plan.md's own rule is a WAVE gate ("dispatch all of Wave B in
# one batch once T01+T02 merge"), so both are encoded here as depends_on.
#
# Engine choice for V1 (see engine-gateway-lab's Phase 15 decision): cloud-only.
# claude-cli for build tasks; codex-cli for T11 (an independent reviewer, not
# the same engine that wrote the code) -- matches routing-policy.yaml's own
# code-review -> codex-cli default. privacy = vendor-allowed throughout:
# VeilGremlin's own source isn't privacy-sensitive (see .hekton/project.yaml,
# privacy_boundary: internal); vendor-allowed lets gateway-run.sh dispatch
# unattended (no per-run confirmation prompt) -- human review happens at the
# control-tower session review/close step instead.

[orchestrator]
gateway_run = "/Users/hekton/Development/hekton/labs/engine-gateway-lab/scripts/gateway-run.sh"
repo = "/Users/hekton/Development/hekton/factory-output/veilgremlin"
default_verify = "cargo build --locked && cargo clippy --all-targets -- -D warnings && cargo fmt --check && cargo test"
default_privacy = "vendor-allowed"
spec_dir = ".hekton/build-tasks"

# --- Epic E1 — Foundation & supply chain (Wave A) ---------------------------

[[task]]
id = "T01"
wave = "A"
depends_on = []
task_type = "code-implement"
engine = "claude-cli"
description = "Cargo workspace + crate skeletons; CI (fmt, clippy -D warnings, cargo-deny, cargo-audit, --locked); bench CI job; release skeleton (SBOM stub, signing stub)."
acceptance = "cargo build green on empty crates; CI runs on PR; cargo-deny config present."
context = ["docs/architecture/agent-factory-plan.md"]
verify_command = "cargo build --locked && cargo fmt --check"

[[task]]
id = "T02"
wave = "A"
depends_on = []
task_type = "code-implement"
engine = "claude-cli"
description = "Freeze shared types + library API in vg-core; define trait seams (Detector, Parser, VaultStore, PolicyEngine, AuditSink); write contract-conformance test stubs."
acceptance = "interface-contracts.md v1 frozen; types compile; conformance test scaffold exists."
context = ["docs/architecture/interface-contracts.md", "docs/architecture/agent-factory-plan.md"]

# --- Epic E2 — Detection & masking primitives (Wave B, parallel) -----------

[[task]]
id = "T03"
wave = "B"
depends_on = ["T01", "T02"]
task_type = "code-implement"
engine = "claude-cli"
# 2026-07-15: expanded after the real T03 pilot dispatch returned a clarifying
# question instead of doing the work -- headless -p mode has no follow-up
# channel, so a terse one-liner was ambiguous enough that claude asked rather
# than acted. Concrete file/module/trait guidance below, plus an explicit
# "use your best judgment, don't ask" instruction, replaces the original
# one-line description (kept in git history: see this file's blame).
description = """
Implement deterministic detectors in `crates/vg-detectors/src/` (currently an empty stub crate
-- see its `lib.rs` docstring: "detector implementations land in Tasks T03/T04"; this task is T03).
Each detector implements `vg_core::traits::Detector` (`fn id(&self) -> DetectorId`, `fn detect(&self,
buf: &[u8], spans: &[Span]) -> Vec<Finding>`, `fn entity_types(&self) -> &[EntityType]` -- see
`crates/vg-core/src/traits.rs`).

Build these five detectors, one module per detector under `crates/vg-detectors/src/`:

1. `email.rs` -- RFC-5322-ish email address regex.
2. `phone.rs` -- E.164-ish phone number regex (accept common separators).
3. `ip.rs` -- IPv4 and IPv6 address regex.
4. `iban_sortcode.rs` -- IBAN (ISO 13616) and UK sort-code patterns.
5. `entropy.rs` -- Shannon-entropy-based detector for high-entropy strings (e.g. API keys/secrets)
   above a tunable threshold, on whitespace/punctuation-delimited tokens.

Use `regex::Regex` (already a workspace dependency) for 1-4, compiled once (`OnceLock` or
equivalent, not per-call). If a dictionary-matching detector is warranted per the interface
contract's Aho-Corasick note, use the `aho-corasick` crate (add as a `vg-detectors` dependency if
not already present) for known-term lists; if no such list is needed for these five, that's fine --
do not add a dictionary detector that isn't specified above.

Wire all five into a `pub fn all_detectors() -> Vec<Box<dyn Detector>>` (or the equivalent
composition point the interface contract specifies) so downstream code can enumerate them.

This is a one-shot headless dispatch: there is no follow-up channel. If any exact naming/shape
choice above is ambiguous, use your best judgment, follow the existing conventions in
`crates/vg-core` and the frozen `interface-contracts.md`, and record the assumption in the PR
description and `docs/decisions.md` rather than asking a clarifying question -- an unasked-but-
documented judgment call is recoverable in review; a session that ends by asking a question is not.
"""
acceptance = "unit tests per detector; bench p95 < 25 ms on reference input."
context = ["docs/architecture/interface-contracts.md"]

[[task]]
id = "T04"
wave = "B"
depends_on = ["T01", "T02"]
task_type = "code-implement"
engine = "claude-cli"
# 2026-07-16: added a real cross-crate integration requirement after the T03 pilot
# (dogfooding/latency review). T04's whole job is "take a Finding, produce a
# placeholder" -- T03 (already closed) is the only real source of Findings that
# exists. Testing T04 only against hand-built mock Findings would mean the FIRST
# time it ever sees a real one is T07's full pipeline wiring, several tasks later.
# 2026-07-17: expanded description with concrete file/module guidance plus an
# explicit "use your best judgment, don't ask" instruction, same fix that
# unblocked T03's first dispatch (a terse one-liner got a clarifying question
# back from headless -p mode instead of code). Kept the original one-liner in
# git history: see this file's blame.
description = """
Implement typed-placeholder + HMAC keying logic, most likely as a new module
`crates/vg-core/src/keying.rs` (vg-core is where Task T02 put all other shared/canonical
logic -- see `crates/vg-core/src/{types,traits,api}.rs` -- and Task T05's not-yet-built
`vg-vault` crate will later call into this from its `VaultStore::intern` implementation;
this task does not need `vg-vault` to exist to be buildable or testable standalone).
`interface-contracts.md`'s `VaultStore` doc comment is the authority on the formula: "stable
placeholder via salted HMAC over `(canonical(value), ty, ns)`" -- see
`crates/vg-core/src/traits.rs` around the `VaultStore` trait and `crates/vg-core/src/types.rs`
for `Placeholder { display: String, mapping_ref: MappingRef }`, `EntityType`, and `Namespace`.

Concretely, this task needs:

1. A `canonicalize(value: &str) -> String` (or similar) normalisation step before hashing --
   e.g. trimming and case-folding where the entity type calls for it -- so trivial
   formatting differences (whitespace, case) don't produce different placeholders for what
   is semantically the same value.
2. A salted HMAC keying function over `(canonical(value), EntityType, Namespace)` (the
   `hmac` + `sha2` crates are reasonable choices; add as `vg-core` dependencies if not
   already present) producing a stable, deterministic key: the same input always yields the
   same key, and a value interned under one `Namespace` must key differently than the same
   value under a different one (this task does not implement namespace *isolation on lookup*
   -- that's `VaultStore::resolve`'s job, in T05 -- but the keying function itself must be
   namespace-sensitive as an input, or T05 has nothing to isolate).
3. Per-type ordinal assignment so a `Placeholder`'s `display` string looks like `EMAIL_001`,
   `ACCOUNT_ID_014` (see `README.md`'s own example) -- the first time a distinct key is seen
   for a given `EntityType` within a `Namespace`, it gets the next sequential number for that
   type; the same key seen again returns the same ordinal.
4. Luhn checksum (for card-number-shaped values) and mod-97 checksum (for IBAN-shaped values)
   validators, used so a placeholder's own display value can be checked (or constructed) to
   remain checksum-valid -- a masked pack that replaces a card number with something that
   fails Luhn on its face is a worse debugging experience than one that doesn't.
5. A session-scoped in-memory cache (a `HashMap` keyed on the same inputs as step 2 is
   reasonable) so repeated keying of the same value within one run doesn't recompute the HMAC
   each time. This is a fast front-cache, not a replacement for T05's persistent vault.

This is a one-shot headless dispatch: there is no follow-up channel. If any exact naming,
module boundary, or type-signature choice above is ambiguous, use your best judgment, follow
the existing conventions already frozen in `crates/vg-core` and `interface-contracts.md`, and
record the assumption in the PR description and `docs/decisions.md` rather than asking a
clarifying question -- an unasked-but-documented judgment call is recoverable in review; a
session that ends by asking a question is not.
"""
acceptance = "same value -> same placeholder within namespace; checksum tests pass. ADDED 2026-07-16: at least one integration test must feed real Findings from vg-detectors::all_detectors() (already built, Task T03) through this task's keying logic end to end -- not only hand-built mock Finding values -- to catch a real interface/shape mismatch (e.g. field content, confidence ranges, entity-type coverage) before Task T07's pipeline wiring, not only at it."
context = ["docs/architecture/interface-contracts.md"]

[[task]]
id = "T08"
wave = "B"
depends_on = ["T01", "T02"]
task_type = "code-implement"
engine = "claude-cli"
# 2026-07-16: added a real cross-crate integration requirement (same rationale as
# T04's, see its comment above). This one is the higher-risk pairing: every
# detector in vg-detectors (Task T03, already closed) already implements
# `fn detect(&self, buf: &[u8], spans: &[Span]) -> Vec<Finding>` -- but all five
# CURRENTLY IGNORE the spans parameter entirely (`_spans` in every signature,
# confirmed 2026-07-16). Nobody has yet exercised a real Span this task produces
# against a real detector's actual (currently no-op) handling of it. This is
# exactly the kind of interface-shape-matches-but-behavior-doesn't-connect risk
# that only surfaces when two independently-built crates are wired together for
# real, and T07 (pipeline wiring) is the earliest point that would otherwise happen.
description = "File-aware parsing: logs, git diffs, JSON/YAML, .env; tree-sitter for one source language; emit Span model to detectors."
acceptance = "parser tests on fixtures; spans typed; error-tolerant on malformed input. ADDED 2026-07-16: at least one integration test must feed this task's real Span output into vg-detectors::all_detectors() (Task T03) on a realistic fixture, and explicitly assert/record whether the detectors' current spans parameter being a no-op is expected at this stage or a real gap worth flagging in docs/decisions.md -- don't let this go unnoticed until Task T07."
context = ["docs/architecture/interface-contracts.md"]

